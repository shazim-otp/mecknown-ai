<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MECK AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <h1>Mecknown</h1>

    <span></span><span></span><span></span>

<style>
:root{
  --bg:#050505;
  --panel:#0b0b0b;
  --soft:#111;
  --text:#eaeaea;
  --muted:#8a8a8a;
  --accent:#00ffff;
  --border:#1a1a1a;
}

/* ===== BASE ===== */
*{box-sizing:border-box}

html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}

body{
  font-family:Inter,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100dvh;
}

/* ===== TOPBAR ===== */
.topbar{
  height:70px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  padding:0 15px;
  border-bottom:1px solid var(--border);
  background:#000;
}

.logo{
  font-size:14px;
  letter-spacing:2px;
  color:var(--accent);
  font-weight:600;
}

/* 🔥 BETA BADGE */
.badge{
  display:inline-block;
  font-size:10px;
  padding:3px 8px;
  border-radius:6px;
  background:#ffaa00;
  color:#000;
  margin-top:4px;
  font-weight:600;
}

/* ===== CHAT ===== */
#chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  min-height:0;
  scroll-behavior:smooth;
}

/* ===== MESSAGE ===== */
.msg{
  max-width:75%;
  padding:12px 16px;
  border-radius:12px;
  background:var(--soft);
  border:1px solid var(--border);
  line-height:1.4;
  font-size:14px;
}

.user{
  margin-left:auto;
  background:var(--accent);
  color:#000;
  font-weight:500;
}

/* ===== INPUT ===== */
footer{
  flex-shrink:0;
  display:flex;
  gap:8px;
  padding:10px;
  border-top:1px solid var(--border);
  background:#050505;
}

footer input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#111;
  color:var(--text);
}

footer button{
  width:45px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#000;
  font-size:16px;
  cursor:pointer;
}

/* ===== LOADING DOTS ===== */
.loading{
  display:flex;
  gap:4px;
}

.loading span{
  width:6px;
  height:6px;
  background:var(--muted);
  border-radius:50%;
  animation:blink 1.4s infinite;
}

.loading span:nth-child(2){animation-delay:0.2s}
.loading span:nth-child(3){animation-delay:0.4s}

@keyframes blink{
  0%,80%,100%{opacity:0.2}
  40%{opacity:1}
}

/* ===== MOBILE ===== */
@media(max-width:600px){
  .msg{
    max-width:90%;
  }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="logo">MECKNOWN AI</div>
    <div class="badge">BETA</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<footer>
  <input id="input" placeholder="Ask MECK…" />
  <button onclick="send()">➤</button>
</footer>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

/* ===== ADD MESSAGE ===== */
function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* ===== TYPING EFFECT ===== */
function typeText(text){
  const d=document.createElement("div");
  d.className="msg";
  chat.appendChild(d);

  let i=0;
  function typing(){
    if(i<text.length){
      d.textContent+=text.charAt(i);
      i++;
      setTimeout(typing,15);
    } else {
      chat.scrollTop=chat.scrollHeight;
    }
  }
  typing();
}

/* ===== LOADING ===== */
function showLoading(){
  const d=document.createElement("div");
  d.className="msg";

  d.innerHTML = `
    <div class="loading">
      <span></span><span></span><span></span>
    </div>
  `;

  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
  return d;
}

/* ===== SEND ===== */
function send(){
  const text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  const loadingEl = showLoading();

  fetch("/command",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      text: text,
      username: localStorage.username || "web-user"
    })
  })
  .then(r=>r.json())
  .then(d=>{
    loadingEl.remove();
    typeText(d.reply);
  })
  .catch(()=>{
    loadingEl.remove();
    add("⚠ Error","ai");
  });
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
