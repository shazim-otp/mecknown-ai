<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MECK AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
:root{
  --bg:#050505;
  --panel:#0b0b0b;
  --soft:#111;
  --glass:rgba(255,255,255,.07);
  --text:#eaeaea;
  --muted:#8a8a8a;
  --accent:#00ffd0;
  --r:34px;
}

body.idle{--accent:#00ffd0}
body.thinking{--accent:#00d9ff}
body.speaking{--accent:#00ff9c}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

.app{display:flex;height:100%}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  background:var(--panel);
  display:flex;
  flex-direction:column;
  transition:transform .3s ease;
}
.sidebar header{
  padding:18px;
  font-size:12px;
  letter-spacing:3px;
  color:var(--muted);
}
.new-chat{
  margin:12px;
  padding:16px;
  border-radius:var(--r);
  background:var(--soft);
  text-align:center;
  cursor:pointer;
}
.chat-list{
  flex:1;
  overflow-y:auto;
  padding:8px;
}
.chat-item{
  padding:14px;
  border-radius:var(--r);
  margin-bottom:10px;
  background:var(--soft);
  font-size:13px;
  cursor:pointer;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}

.topbar{
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
}
.menu-btn{
  display:none;
  background:none;
  border:none;
  font-size:22px;
  color:var(--text);
}
.title{
  flex:1;
  text-align:center;
  letter-spacing:4px;
  font-size:12px;
  color:var(--muted);
}

/* ===== CHAT ===== */
.chat-wrapper{
  flex:1;
  position:relative;
  overflow:hidden;
}
#chat{
  height:100%;
  overflow-y:auto;
  padding:26px;
  padding-bottom:190px;
}
.msg{
  max-width:75%;
  padding:20px 26px;
  margin-bottom:22px;
  border-radius:42px;
  background:var(--glass);
  backdrop-filter:blur(18px);
  animation:pop .3s ease;
}
.user{
  margin-left:auto;
  background:var(--soft);
}
@keyframes pop{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

/* ===== INPUT ===== */
footer{
  position:sticky;
  bottom:0;
  padding:14px;
  background:linear-gradient(to top,var(--bg),transparent);
  display:flex;
  gap:12px;
}
footer input{
  flex:1;
  padding:18px 24px;
  border-radius:46px;
  border:none;
  background:var(--soft);
  color:var(--text);
  font-size:15px;
}
footer button{
  width:56px;
  height:56px;
  border-radius:50%;
  border:none;
  background:var(--soft);
  color:var(--text);
  font-size:18px;
}

/* ===== NEURAL CANVAS ===== */
#neural{
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    inset:0 auto 0 0;
    transform:translateX(-100%);
    z-index:50;
  }
  .sidebar.show{transform:translateX(0)}
  .menu-btn{display:block}
}
</style>
</head>

<body class="idle">

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <header>MECK AI</header>
    <div class="new-chat" onclick="newChat()">＋ New Chat</div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="sidebar.classList.toggle('show')">☰</button>
      <div class="title">MECK AI</div>
    </div>

    <div class="chat-wrapper">
      <canvas id="neural"></canvas>
      <div id="chat"></div>
    </div>

    <footer>
      <input id="input" placeholder="Ask MECK…" />
      <button onclick="send()">➤</button>
    </footer>
  </div>
</div>

<script>
/* ===== SIDEBAR / CHAT STATE ===== */
const sidebar=document.getElementById("sidebar");
const chatList=document.getElementById("chatList");
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let chats=[[]],current=0;

function newChat(){
  chats.push([]);
  current=chats.length-1;
  chat.innerHTML="";
  renderChats();
  sidebar.classList.remove("show");
}

function renderChats(){
  chatList.innerHTML="";
  chats.forEach((c,i)=>{
    const d=document.createElement("div");
    d.className="chat-item";
    d.textContent=c[0]?.text.slice(0,28)||"New Conversation";
    d.onclick=()=>{current=i;loadChat()};
    chatList.appendChild(d);
  });
}

function loadChat(){
  chat.innerHTML="";
  chats[current].forEach(m=>add(m.text,m.cls,false));
  sidebar.classList.remove("show");
}

/* ===== NEURAL CANVAS ===== */
const canvas=document.getElementById("neural");
const ctx=canvas.getContext("2d");
let w,h,nodes=[];

function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);resize();

for(let i=0;i<50;i++){
  nodes.push({
    x:Math.random()*w,
    y:Math.random()*h,
    vx:(Math.random()-.5)*.25,
    vy:(Math.random()-.5)*.25
  });
}

function animate(){
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle=getComputedStyle(document.body).getPropertyValue("--accent");
  ctx.globalAlpha=.35;

  nodes.forEach(n=>{
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>w)n.vx*=-1;
    if(n.y<0||n.y>h)n.vy*=-1;

    nodes.forEach(m=>{
      const d=Math.hypot(n.x-m.x,n.y-m.y);
      if(d<140){
        ctx.lineWidth=1-d/140;
        ctx.beginPath();
        ctx.moveTo(n.x,n.y);
        ctx.lineTo(m.x,m.y);
        ctx.stroke();
      }
    });
  });
  requestAnimationFrame(animate);
}
animate();

/* ===== CHAT LOGIC ===== */
function add(text,cls,save=true){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
  if(save) chats[current].push({text,cls});
}

function speak(text){
  if(!speechSynthesis)return;
  document.body.className="speaking";
  const u=new SpeechSynthesisUtterance(text);
  u.onend=()=>document.body.className="idle";
  speechSynthesis.speak(u);
}

/* ===== 🔥 FIXED SEND FUNCTION (BACKEND CONNECTED) ===== */
function send(){
  const text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";
  document.body.className="thinking";

  fetch("/command",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      text: text,
      username: localStorage.username || "web-user"
    })
  })
  .then(r=>r.json())
  .then(d=>{
    document.body.className="idle";
    add(d.reply,"ai");
    speak(d.reply);
    renderChats();
  })
  .catch(err=>{
    document.body.className="idle";
    add("⚠ Backend error","ai");
    console.error(err);
  });
}

input.addEventListener("keydown",e=>{if(e.key==="Enter")send()});
newChat();
</script>

</body>
</html>
