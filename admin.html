<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MECK AI – Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:white;
}

header{
  padding:16px;
  font-size:22px;
  text-align:center;
  letter-spacing:2px;
  background:#000;
  border-bottom:1px solid #222;
}

.stats{
  display:flex;
  gap:12px;
  padding:16px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:160px;
  background:#111;
  border:1px solid #222;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

.card h2{
  margin:0;
  font-size:28px;
  color:#1e90ff;
}

.card p{
  margin:6px 0 0;
  color:#aaa;
}

.section{
  padding:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border-bottom:1px solid #222;
  padding:10px;
  text-align:left;
  font-size:14px;
}

th{
  color:#1e90ff;
}

tr:hover{
  background:#111;
}

.small{
  color:#aaa;
  font-size:12px;
}
</style>
</head>

<body>

<header>MECK AI – Admin Dashboard</header>

<div class="stats">
  <div class="card">
    <h2 id="userCount">0</h2>
    <p>Total Users</p>
  </div>
  <div class="card">
    <h2 id="msgCount">0</h2>
    <p>Total Messages</p>
  </div>
</div>

<div class="section">
  <h3>Users</h3>
  <table id="usersTable">
    <tr><th>Name</th><th>Joined</th></tr>
  </table>
</div>

<div class="section">
  <h3>Chat Logs</h3>
  <table id="logsTable">
    <tr>
      <th>User</th>
      <th>Question</th>
      <th>Reply</th>
      <th>Time</th>
    </tr>
  </table>
</div>

<script>
fetch("/admin-data")
.then(r=>r.json())
.then(data=>{
  document.getElementById("userCount").innerText=data.total_users;
  document.getElementById("msgCount").innerText=data.total_logs;

  const usersTable=document.getElementById("usersTable");
  for(const u in data.users){
    const row=usersTable.insertRow();
    row.insertCell(0).innerText=u;
    row.insertCell(1).innerText=data.users[u].joined;
  }

  const logsTable=document.getElementById("logsTable");
  data.logs.slice().reverse().forEach(l=>{
    const row=logsTable.insertRow();
    row.insertCell(0).innerText=l.user;
    row.insertCell(1).innerText=l.question;
    row.insertCell(2).innerText=l.reply;
    row.insertCell(3).innerText=l.time;
  });
});
</script>

</body>
</html>
